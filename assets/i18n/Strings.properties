# --- Ability / knight entries ---
guide.ability.masks.name=Masks
guide.ability.masks.desc=Your health is shown as masks. You start with {0} masks. Taking damage from enemies, projectiles, or spikes removes one mask. When all masks are gone, you respawn at the last safe spot with full health. After taking damage, you are briefly invincible for about 1 second.

guide.ability.soulVessel.name=Soul Vessel
guide.ability.soulVessel.desc=Hitting enemies with your Nail grants {0} soul, filling the circular vessel next to your masks (up to a maximum of {1}). Soul persists between rooms and is spent to Focus (heal) or cast Spells.

guide.ability.focus.name=Focus
guide.ability.focus.desc=Hold the Focus key while standing still on the ground to channel for {0} seconds, consuming {1} soul and restoring one mask. Moving, jumping, dashing, attacking, or taking damage cancels the channel and refunds no soul.

guide.ability.vengefulSpirit.name=Vengeful Spirit
guide.ability.vengefulSpirit.desc=Costs {0} soul. Fires a horizontal magical projectile in the direction you are facing that pierces through enemies, dealing {1} damage. Movement is locked briefly during the cast. Destroys itself on contact with walls.

guide.ability.howlingWraiths.name=Howling Wraiths
guide.ability.howlingWraiths.desc=Costs {0} soul. Hold Up + Cast to unleash an upward magic burst above your head, dealing {1} damage in three rapid ticks. Ideal for hitting flying or falling enemies. Movement is locked briefly during the cast.

guide.ability.dash.name=Dash
guide.ability.dash.desc=A quick horizontal burst of speed that briefly ignores gravity. Has a short cooldown after each use. Can only be used once per airborne excursion unless refreshed by landing.

guide.ability.doubleJump.name=Double Jump
guide.ability.doubleJump.desc=Press the Jump key again while airborne to perform a second jump with a distinct animation. Refreshes after touching the ground or wall-jumping.

guide.ability.wallSlide.name=Wall Jump
guide.ability.wallSlide.desc=Hold the directional key toward a vertical wall while airborne to slide down it slowly. Press Jump while sliding to launch off the wall in the opposite direction.

guide.ability.pogo.name=Pogo Jump
guide.ability.pogo.desc=Hold Down + Attack while airborne to strike downward. If the strike hits an enemy or spikes, you bounce back upward. Limited to one pogo and one dash per jump.

