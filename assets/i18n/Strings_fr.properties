charm.quickSlashDescription=Permet au porteur de frapper bien plus rapidement avec son aiguillon.
charm.quickFocusDescription=Augmente la vitesse de concentration de l'ÂME, permettant au porteur de soigner ses blessures plus rapidement.
charm.heavyBlowDescription=Augmente la force de la griffe du porteur, repoussant davantage les ennemis lorsqu'ils sont touchés.
charm.sharpShadowDescription=Lors de l'utilisation de la Ruée d'ombre, le corps du porteur s'affûte et inflige des dégâts aux ennemis.
charm.voidHeartDescription=Ce talisman fait partie intégrante de son porteur et ne peut être retiré.

