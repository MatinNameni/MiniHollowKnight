# Zote The Mighty

# --- Identity / UI ---
zote.name=Zote le Tout-Puissant
zote.interactPrompt=Appuyez sur E pour parler
zote.continueHint=Appuyez sur Entrée pour continuer

# --- Initial dialogue ---
zote.line.1=Hé, toi ! Tu peux m'appeler Zote le Tout-Puissant. Je suis un guerrier de grande renommée, qui traverse ce royaume en quête d'ennemis dignes de ce nom et de hauts faits. Ne sois pas intimidé par ma présence - sous cette apparence redoutable, je suis d'une générosité sans pareille.
zote.line.2=Bah ! Tu me dévisages comme un enfant ahuri. J'ai parcouru un long chemin pour atteindre ce royaume misérable, et j'ai dû affronter des périls que tu ne saurais imaginer. Bêtes immondes, terrains traîtres, nuits sans sommeil - tout surmonté grâce à mon habileté inégalée et ma volonté indestructible.
zote.line.3=Retiens ceci, petit. Si tu me croises à nouveau, je serai plongé dans une profonde méditation, affinant les Préceptes qui guident mon existence. Chaque Précepte est une perle de sagesse, durement acquise et polie par l'expérience. Écoute bien, et peut-être qu'un jour une fraction de ma grandeur se reportera sur toi.

# --- Precepts of Zote ---
zote.precept.1=Premier précepte : « Remporte toujours tes batailles ».\n\nPerdre une bataille ne t'apporte rien et ne t'enseigne rien. Remporte tes batailles, ou ne les livre pas du tout !
zote.precept.2=Deuxième précepte : « Ne laissez jamais personne se moquer de vous. »\n\nLes sots rient de tout, même de leurs supérieurs. Mais attention, le rire n'est pas sans danger ! Il se propage comme une maladie, et bientôt, tout le monde se moque de vous.\nIl vous faut frapper rapidement à la source de cette gaieté perverse pour enrayer sa propagation.
zote.precept.3=Troisième précepte : « Soyez toujours reposé ».\n\nLe combat et l'aventure mettent votre corps à rude épreuve. Lorsque vous vous reposez, votre corps se renforce et se répare. Plus vous vous reposez longtemps, plus vous gagnez en force.
zote.precept.4=Quatrième précepte : « Oubliez votre passé ».\n\nLe passé est douloureux, et y penser ne peut que vous apporter du malheur. Pensez plutôt à autre chose, comme à l'avenir ou à de la nourriture.
zote.precept.5=Cinquième précepte : « La force l'emporte sur la force ».\n\nVotre adversaire est-il fort ? Peu importe ! Il suffit de surpasser sa force par une force encore plus grande, et il sera bientôt vaincu.
zote.precept.6=Sixième précepte : « Choisis ton propre destin ».\n\nNos anciens enseignent que notre destin est choisi pour nous avant même notre naissance. Je ne suis pas d'accord.
zote.precept.7=Septième précepte : « Ne pleurez pas les morts ».\n\nLorsque nous mourons, notre sort s'améliore-t-il ou empire-t-il ? Impossible de le savoir ; inutile, donc, de s'encombrer du deuil. Ou de la célébration, d'ailleurs.
zote.precept.8=Huitième précepte : « Voyagez seul ».\n\nOn ne peut compter sur personne, et personne n’est toujours loyal. Par conséquent, personne ne devrait être votre compagnon constant.
zote.precept.9=Neuvième précepte : « Gardez votre foyer en ordre ».\n\nVotre foyer est le lieu où vous abritez votre bien le plus précieux : vous-même. Par conséquent, vous devriez veiller à le maintenir propre et agréable.
zote.precept.10=Dixième précepte : « Garde ton arme bien affûtée ».\n\nJe veille à ce que mon arme, « Faucheuse de vies », reste toujours parfaitement affûtée. Cela rend la découpe bien plus aisée.
zote.precept.11=Onzième précepte : « Les mères finiront toujours par vous trahir ».\n\nCe précepte se passe d'explication.
zote.precept.12=Douzième précepte : « Gardez votre manteau au sec ».\n\nSi votre manteau est mouillé, séchez-le dès que possible. Porter un manteau humide est désagréable et peut entraîner la maladie.
zote.precept.13=Treizième précepte : « N'ayez jamais peur ».\n\nLa peur ne peut que vous freiner. Affronter ses peurs peut exiger un effort considérable. Par conséquent, il vaut mieux, tout simplement, ne pas avoir peur dès le départ.
zote.precept.14=Quatorzième précepte : « Respectez vos supérieurs ».\n\nSi quelqu'un vous est supérieur en force, en intelligence ou dans les deux domaines, vous devez lui témoigner du respect. Ne l'ignorez pas et ne vous moquez pas de lui.
zote.precept.15=Précepte quinze : « Un ennemi, un coup ».\n\nVous ne devez porter qu'un seul coup pour vaincre un ennemi. Tout coup supplémentaire est un gaspillage. De plus, en comptant vos coups pendant le combat, vous saurez combien d'ennemis vous avez vaincus.
zote.precept.16=Seizième précepte : « N'hésitez pas ».\n\nUne fois que vous avez pris une décision, mettez-la à exécution sans regarder en arrière. Vous accomplirez bien plus ainsi.
zote.precept.17=Dix-septième précepte : « Crois en ta force ».\n\nD'autres peuvent douter de toi, mais il est une personne en qui tu peux toujours avoir confiance : toi-même. Crois en ta propre force et tu ne faibliras jamais.
zote.precept.18=Dix-huitième précepte : « Cherche la vérité dans les ténèbres ».\n\nCe précepte s'explique également de lui-même.
zote.precept.19=Dix-neufième précepte : « Qui ne tente rien n’a rien ».\n\nSi vous entreprenez quelque chose, assurez-vous de le réussir. Si vous n’y parvenez pas, vous avez échoué ! Évitez cela à tout prix.
zote.precept.20=Vingtième précepte : « Ne dites que la vérité ».\n\nLorsque vous vous adressez à quelqu'un, il est courtois — et efficace — de dire la vérité. Prenez toutefois garde : dire la vérité peut vous attirer des ennemis. C'est une chose qu'il vous faudra assumer.
