# --- Ability / knight entries ---
guide.ability.masks.name=Masques
guide.ability.masks.desc=Votre santé est affichée sous forme de masques. Vous commencez avec {0} masques. Subir des dégâts des ennemis, projectiles ou pieux retire un masque. Quand tous les masques sont épuisés, vous réapparaissez au dernier point sûr avec toute votre santé. Après avoir été touché, vous êtes brièvement invincible pendant environ 1 seconde.

guide.ability.soulVessel.name=Récipient d'Âme
guide.ability.soulVessel.desc=Frapper les ennemis avec votre Clou vous rapporte {0} d'âme, remplissant le récipient circulaire à côté de vos masques (jusqu'à un maximum de {1}). L'âme persiste entre les salles et est dépensée pour se Concentrer (soin) ou lancer des Sorts.

guide.ability.focus.name=Concentration (Soin)
guide.ability.focus.desc=Maintenez la touche de Concentration en restant immobile au sol pour canaliser pendant {0} secondes, consommant {1} d'âme et restaurant un masque. Bouger, sauter, glisser, attaquer ou subir des dégâts annule la canalisation sans remboursement d'âme.

guide.ability.vengefulSpirit.name=Esprit Vengeur
guide.ability.vengefulSpirit.desc=Coûte {0} d'âme. Lance un projectile magique horizontal dans la direction vers laquelle vous faites face, qui traverse les ennemis et inflige {1} dégâts. Les mouvements sont brièvement verrouillés pendant l'incantation. Le projectile se dissipe au contact des murs.

guide.ability.howlingWraiths.name=Hurlement des Spectres
guide.ability.howlingWraiths.desc=Coûte {0} d'âme. Maintenez Haut + Incantation pour déclencher une explosion magique vers le haut au-dessus de votre tête, infligeant {1} dégâts en trois rapides successions. Idéal contre les ennemis volants ou en chute. Mouvements brièvement verrouillés pendant l'incantation.

guide.ability.dash.name=Glissade
guide.ability.dash.desc=Une rapide pointée horizontale qui ignore brièvement la gravité. Possède un court temps de recharge après chaque utilisation. Ne peut être utilisée qu'une fois par saut tant que vous êtes en l'air, sauf si régénérée en touchant le sol.

guide.ability.doubleJump.name=Double Saut
guide.ability.doubleJump.desc=Appuyez à nouveau sur la touche de Saut en l'air pour effectuer un second saut avec une animation distincte. Régénéré après avoir touché le sol ou effectué un saut mural.

guide.ability.wallSlide.name=Saut Murale
guide.ability.wallSlide.desc=Maintenez la touche directionnelle vers un mur vertical en l'air pour glisser lentement le long de celui-ci. Appuyez sur Saut pendant la glissade pour propulser le chevalier dans la direction opposée.

guide.ability.pogo.name=Saut Pogo
guide.ability.pogo.desc=Maintenez Bas + Attaque en l'air pour frapper vers le bas. Si la frappe touche un ennemi ou des pieux, vous rebondissez vers le haut. Limité à un pogo et une glissade par saut.

